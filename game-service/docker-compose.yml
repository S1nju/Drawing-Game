services:
  game-service:
    build: .
    ports:
      - "3000:3000"
      - "50052:50052"
    depends_on:
      - DB_GAME
    restart: always
    environment:
      DB_HOST: DB_GAME
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
      DB_NAME: game_db

  DB_GAME:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: game_db
    ports:
      - "5436:5432"